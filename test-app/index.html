<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Board Game Engine React – E2E harness</title>
    <style>
      html, body { margin: 0; min-height: 100vh; font-family: system-ui, -apple-system, sans-serif; background: #0f172a; color: #e5e7eb; }
      #root { padding: 1rem 1.5rem 2rem; }
      .harness__controls { display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center; margin-bottom: 1rem; }
      .harness__controls label { font-size: 0.9rem; }
      .harness__controls select, .harness__controls input, .harness__controls button {
        background: #1e293b; color: #e5e7eb; border: 1px solid #334155; border-radius: 6px; padding: 0.4rem 0.75rem; font-size: 0.9rem;
      }
      .harness__controls button { cursor: pointer; background: #16a34a; color: #fff; border: none; font-weight: 600; }
      .harness__controls button:hover { filter: brightness(1.1); }
      .harness__controls button:disabled { opacity: 0.6; cursor: not-allowed; }
      .harness__game { min-height: 200px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.jsx"></script>
  </body>
</html>
